<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mon Jeu d'Horreur</title>
    <style>
        /* Style simple pour l'ambiance */
        body {
            background-color: #111111; /* Fond noir */
            color: #ffffff;            /* Texte blanc */
            font-family: Arial, sans-serif;
            text-align: center;        
            padding: 50px;
        }

        h1 {
            color: #ff0000;            /* Titre en Rouge */
            font-size: 40px;
            text-transform: uppercase;
        }

        .description {
            font-size: 18px;
            max-width: 700px;
            margin: 20px auto;
        }

        /* --- SECTION IMAGES --- */
        .galerie {
            margin-top: 40px;
            display: flex;          /* Aligne les images côte à côte */
            justify-content: center;
            flex-wrap: wrap;       /* Les met à la ligne si pas assez de place */
            gap: 15px;             /* Espace entre les images */
        }

        .galerie img {
            width: 300px;          /* Largeur des images */
            height: 180px;
            object-fit: cover;     /* Garde une belle forme sans déformer */
            border: 2px solid #333;
            border-radius: 5px;
            transition: border-color 0.3s;
        }

        .galerie img:hover {
            border-color: #ff0000; /* Cadre rouge quand on passe la souris */
        }

        /* Le bouton pour télécharger */
        .bouton-jeu {
            display: inline-block;
            background-color: #ff0000; 
            color: white;
            padding: 15px 30px;
            font-size: 20px;
            text-decoration: none;     
            font-weight: bold;
            border-radius: 5px;
            margin-top: 40px;
        }

        .bouton-jeu:hover {
            background-color: #b30000; 
        }
    </style>
</head>
<body>

    <h1>NOM DE TON JEU D'HORREUR</h1>

    <p><i>Une fois entré, il sera trop tard pour faire demi-tour...</i></p>

    <div class="description">
        <p>Bienvenue sur la page officielle de mon jeu d'horreur. Explorez des lieux hantés, résolvez des énigmes et essayez de survivre face aux monstres cachés dans le noir.</p>
    </div>

    <!-- Section des captures d'écran -->
    <div class="galerie">
        <!-- Remplace "image1.jpg" etc. par le vrai nom de tes fichiers images -->
        <img src="image1.jpg" alt="Capture du jeu 1">
        <img src="image2.jpg" alt="Capture du jeu 2">
        <img src="image3.jpg" alt="Capture du jeu 3">
    </div>

    <br>

    <a href="#" class="bouton-jeu">TÉLÉCHARGER LE JEU</a>

</body>
</html>
